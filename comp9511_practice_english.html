<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COMP9511 Final Practice</title>
<style>
:root {
  --bg:#f6f7fb; --card:#fff; --text:#222; --muted:#667085; --brand:#2563eb;
  --ok:#059669; --bad:#dc2626; --warn:#f59e0b; --line:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
header{background:#111827;color:white;padding:18px 22px;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:22px}
header p{margin:6px 0 0;color:#d1d5db;font-size:14px}
.layout{display:grid;grid-template-columns:280px 1fr;gap:18px;padding:18px;max-width:1500px;margin:auto}
.sidebar{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;position:sticky;top:92px;height:calc(100vh - 110px);overflow:auto}
.main{min-width:0}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;margin:4px;cursor:pointer;font-weight:600}
.btn:hover{border-color:var(--brand)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.green{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn.red{background:var(--bad);color:#fff;border-color:var(--bad)}
.btn.gray{background:#f3f4f6}
.btn.block{display:block;width:100%;text-align:left;margin:6px 0}
input.search{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px}
.topic{font-size:13px;color:#fff;background:#4b5563;border-radius:999px;padding:5px 10px;display:inline-block;margin-bottom:8px}
.badge{font-size:12px;color:#344054;background:#eef2ff;border-radius:999px;padding:4px 8px;margin-left:6px}
.question h2{font-size:20px;margin:8px 0 14px;line-height:1.4}
.option{display:block;border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;cursor:pointer;background:#fff}
.option:hover{background:#f9fafb}
.option input{margin-right:8px}
.correct{border-color:var(--ok)!important;background:#ecfdf5!important}
.wrong{border-color:var(--bad)!important;background:#fef2f2!important}
.explain{border-left:4px solid var(--brand);background:#eff6ff;padding:12px;border-radius:8px;margin-top:12px;line-height:1.6}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:10px;min-width:120px}
.small{font-size:13px;color:var(--muted)}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:10px 0}
.progress div{height:100%;background:var(--brand);width:0%}
@media(max-width:800px){
  .layout{grid-template-columns:1fr;padding:10px}
  .sidebar{position:relative;top:0;height:auto}
  header{position:relative}
}
</style>
</head>
<body>
<header>
  <h1>COMP9511 Final Practice Website</h1>
  <p>Questions and options are fully in English. Explanations are in Chinese. Includes topic practice, wrong-question book, and mock exam.</p>
</header>
<div class="layout">
  <aside class="sidebar">
    <input id="search" class="search" placeholder="Search questions or topics..." oninput="render()" />
    <button class="btn primary block" onclick="setMode('practice')">Topic Practice</button>
    <button class="btn block" onclick="setMode('exam')">Mock Exam</button>
    <button class="btn block" onclick="setMode('wrong')">Wrong Question Book</button>
    <button class="btn block" onclick="resetProgress()">Reset Progress</button>
    <hr>
    <div class="small">Filter by topic:</div>
    <div id="topics"></div>
  </aside>
  <main class="main">
    <div class="card">
      <div class="stats">
        <div class="stat"><b id="totalQ">0</b><div class="small">Total questions</div></div>
        <div class="stat"><b id="doneQ">0</b><div class="small">Answered</div></div>
        <div class="stat"><b id="wrongQ">0</b><div class="small">Wrong saved</div></div>
        <div class="stat"><b id="scoreQ">0%</b><div class="small">Accuracy</div></div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
    <div id="app"></div>
  </main>
</div>
<script>
const QUESTIONS = [{"topic": "Basic Models", "type": "single", "q": "Which statement best describes a conceptual model in HCI?", "options": ["A user's emotional reaction to an interface", "An abstract idea of how a system or object works", "A list of usability problems found during testing", "A visual colour scheme used in interface design"], "answer": [1], "explanation": "Conceptual model 是设计者想表达的系统运作逻辑。用户是否能理解这个逻辑，会直接影响他们形成的 mental model。"}, {"topic": "Basic Models", "type": "single", "q": "A good interface design usually occurs when:", "options": ["The user's mental model matches the designer's conceptual model", "The interface has many advanced functions", "The system uses many animations", "The interface hides most functions"], "answer": [0], "explanation": "好设计的关键不是功能越多越好，而是用户能正确理解系统如何工作，也就是用户的 mental model 与设计者的 conceptual model 对齐。"}, {"topic": "Basic Models", "type": "single", "q": "What is an interface metaphor?", "options": ["A programming method for drawing icons", "A visual or interaction pattern based on users' existing knowledge from another domain", "A type of usability testing script", "A mathematical model for predicting pointing time"], "answer": [1], "explanation": "Interface metaphor 利用用户已有经验帮助他们理解新系统，例如购物车图标代表购物、信封代表邮件。"}, {"topic": "Basic Models", "type": "multiple", "q": "Which are benefits of interface metaphors?", "options": ["They can make a new system easier to learn", "They can help users understand the conceptual model", "They can make digital systems more accessible to different users", "They always remove all usability problems"], "answer": [0, 1, 2], "explanation": "界面隐喻可以降低学习成本、帮助理解系统概念，也能让更多用户更容易接触系统。但它不可能自动消除所有可用性问题。"}, {"topic": "Basic Models", "type": "multiple", "q": "Which are potential problems of interface metaphors?", "options": ["They may limit designers' creativity", "They may force users to understand the system only through the metaphor", "They may carry poor existing design into the new system", "They always improve learnability"], "answer": [0, 1, 2], "explanation": "隐喻有帮助，但也可能限制创新，甚至把旧系统的坏设计一起带入新系统。"}, {"topic": "Goals and Tasks", "type": "single", "q": "Which statement best distinguishes goals from tasks?", "options": ["Goals are steps; tasks are desired outcomes", "Goals are what users want to achieve; tasks are steps used to achieve them", "Goals are always technology-specific; tasks are always time-invariant", "Goals only apply to expert users"], "answer": [1], "explanation": "Goal 是用户真正想达成的结果，task 是为了实现目标而执行的步骤。技术变化时，task 可能变化，但 goal 往往更稳定。"}, {"topic": "Goals and Tasks", "type": "single", "q": "A user wants to buy a train ticket online. Which is the goal?", "options": ["Clicking the search button", "Entering the departure city", "Buying a train ticket", "Selecting a payment method"], "answer": [2], "explanation": "购买火车票才是最终目标，其他都是完成目标所需的任务步骤。"}, {"topic": "Design Principles", "type": "single", "q": "Affordance means that:", "options": ["The system gives feedback after an action", "The appearance of an object suggests how it can be used", "The system prevents users from making errors", "The layout is visually symmetrical"], "answer": [1], "explanation": "Affordance 是“看起来就知道怎么用”。例如按钮看起来可点击，滑块看起来可拖动。"}, {"topic": "Design Principles", "type": "single", "q": "Which example best shows poor affordance?", "options": ["A button that looks raised and clickable", "A slider with a visible handle", "Clickable text that looks exactly like normal body text", "A switch that visually indicates on/off state"], "answer": [2], "explanation": "如果可点击内容看起来和普通文字一样，用户很难知道它可以点，这就是 affordance 不好。"}, {"topic": "Design Principles", "type": "single", "q": "Visibility in interface design means:", "options": ["Important functions should be easy to see", "All functions must be hidden in menus", "The interface should use bright colours only", "The system should avoid text labels"], "answer": [0], "explanation": "Visibility 强调主要功能要让用户看得见。用户看不见功能，就不知道如何与系统交互。"}, {"topic": "Design Principles", "type": "single", "q": "Feedback means that:", "options": ["The interface prevents all mistakes", "The system responds to user actions in a meaningful way", "The interface uses the same layout everywhere", "The system removes advanced functions"], "answer": [1], "explanation": "Feedback 是用户操作后的系统回应，比如按钮变色、加载条、成功提示、错误提示。"}, {"topic": "Design Principles", "type": "multiple", "q": "Which examples are forms of feedback?", "options": ["A progress bar during upload", "A success message after saving", "A button changing colour after being clicked", "A hidden menu with no visible response"], "answer": [0, 1, 2], "explanation": "进度条、成功信息、按钮状态变化都告诉用户系统正在或已经响应。隐藏且无反馈的菜单不是好反馈。"}, {"topic": "Design Principles", "type": "single", "q": "Constraints are mainly used to:", "options": ["Make the interface more colourful", "Prevent inappropriate or erroneous user actions", "Increase the number of available choices", "Remove all user freedom"], "answer": [1], "explanation": "Constraints 通过限制用户行为来减少错误，例如禁用按钮、表单验证、删除确认。"}, {"topic": "Design Principles", "type": "multiple", "q": "Which are types of constraints in interaction design?", "options": ["Physical constraints", "Semantic constraints", "Cultural constraints", "Logical constraints"], "answer": [0, 1, 2, 3], "explanation": "约束包括 physical、semantic、cultural、logical 四类，都可以帮助用户避免误操作。"}, {"topic": "Design Principles", "type": "single", "q": "Consistency means that:", "options": ["Every screen should look completely different", "Similar words, situations, and actions should have consistent meanings", "Users should memorize all commands", "Advanced functions should be removed"], "answer": [1], "explanation": "Consistency 强调相同系统内或相似系统之间，文字、操作、布局和反馈应保持一致，减少学习成本。"}, {"topic": "Design Principles", "type": "single", "q": "Mapping is strongest when:", "options": ["Controls are unrelated to their effects", "The layout of controls matches the objects or actions they control", "The interface hides controls from users", "The system uses random icon positions"], "answer": [1], "explanation": "Mapping 指控制器与结果之间的对应关系。比如炉灶旋钮位置对应炉眼位置，就是好的 mapping。"}, {"topic": "Heuristic Principles", "type": "single", "q": "Which heuristic is mainly concerned with keeping users informed about what is going on?", "options": ["Visibility of system status", "Error prevention", "Aesthetic and minimalist design", "Recognition rather than recall"], "answer": [0], "explanation": "Visibility of system status 要求系统及时反馈当前状态，例如加载、保存、上传进度。"}, {"topic": "Heuristic Principles", "type": "single", "q": "If a system uses familiar user language instead of technical jargon, which heuristic does it support?", "options": ["Match between system and the real world", "Flexibility and efficiency of use", "Help and documentation", "Error prevention"], "answer": [0], "explanation": "Match between system and real world 要求使用用户熟悉的语言、概念、流程，而不是系统内部术语。"}, {"topic": "Heuristic Principles", "type": "single", "q": "An Undo button mainly supports which heuristic?", "options": ["User control and freedom", "Aesthetic and minimalist design", "Help and documentation", "Consistency and standards"], "answer": [0], "explanation": "Undo、Cancel、Back 都体现用户控制与自由，让用户能从错误操作中退出或恢复。"}, {"topic": "Heuristic Principles", "type": "single", "q": "A confirmation dialog before deleting an account is an example of:", "options": ["Error prevention", "Recognition rather than recall", "Flexibility of use", "Social presence"], "answer": [0], "explanation": "删除账号属于高风险操作，确认弹窗能防止误删，是 error prevention。"}, {"topic": "Heuristic Principles", "type": "single", "q": "A useful error message should:", "options": ["Only display an error code", "Use technical database terminology", "Explain the problem and suggest how to recover", "Blame the user for the mistake"], "answer": [2], "explanation": "好的错误提示应该让用户知道发生了什么、为什么发生、下一步怎么解决。"}, {"topic": "Heuristic Principles", "type": "single", "q": "Showing recently used files supports which heuristic?", "options": ["Recognition rather than recall", "User control and freedom", "Consistency and standards", "Error prevention"], "answer": [0], "explanation": "最近文件列表让用户识别而不是回忆，减少记忆负担。"}, {"topic": "Heuristic Principles", "type": "multiple", "q": "Which features support flexibility and efficiency of use?", "options": ["Keyboard shortcuts", "Search box", "Frequently used actions placed prominently", "Forcing all users through the same long tutorial every time"], "answer": [0, 1, 2], "explanation": "熟手需要快捷路径，新手需要清晰路径。快捷键、搜索和常用功能前置都能提升效率。"}, {"topic": "Heuristic Principles", "type": "single", "q": "Aesthetic and minimalist design means:", "options": ["Using as many decorative elements as possible", "Removing irrelevant information and unnecessary steps", "Avoiding all colours", "Using only text without icons"], "answer": [1], "explanation": "极简设计不是没有设计，而是减少无关内容，让用户更容易关注任务。"}, {"topic": "Usability Goals", "type": "single", "q": "Effectiveness refers to:", "options": ["How enjoyable a product feels", "Whether users can achieve their goals", "How beautiful the interface looks", "How many colours are used"], "answer": [1], "explanation": "Effectiveness 是用户能不能完成目标。例如地图能不能帮用户找到路线。"}, {"topic": "Usability Goals", "type": "single", "q": "Efficiency refers to:", "options": ["Completing a task with minimum effort or steps", "Preventing all emotional responses", "Making the interface look complex", "Using advanced terminology"], "answer": [0], "explanation": "Efficiency 关注用户能否用较少时间、步骤、点击完成任务。"}, {"topic": "Usability Goals", "type": "single", "q": "Utility means that:", "options": ["The product provides functions users need to achieve their goals", "The product is fun to use", "The product has no colours", "The product works only on desktop"], "answer": [0], "explanation": "Utility 关注功能是否足够。如果用户需要导出 PDF，但系统没有这个功能，就是 utility 不足。"}, {"topic": "Usability Goals", "type": "single", "q": "Safety in usability mainly means:", "options": ["The interface has strong colour contrast only", "The system prevents serious errors and supports recovery", "The product is entertaining", "The system removes all buttons"], "answer": [1], "explanation": "Safety 包括防误触、防严重错误、防止数据丢失，以及支持撤销恢复。"}, {"topic": "Usability Goals", "type": "single", "q": "Learnability means:", "options": ["Users can remember the system after months", "Users can quickly learn how to use the system for the first time", "Experts can use shortcuts", "Users feel emotionally satisfied"], "answer": [1], "explanation": "Learnability 是首次上手是否容易；memorability 是隔一段时间后是否还记得怎么用。"}, {"topic": "User Experience Goals", "type": "single", "q": "Which word is a desirable user experience goal?", "options": ["Frustrating", "Annoying", "Engaging", "Confusing"], "answer": [2], "explanation": "Engaging 是积极体验目标；frustrating、annoying、confusing 都是负面体验。"}, {"topic": "User Experience Goals", "type": "multiple", "q": "Which are undesirable user experience goals?", "options": ["Boring", "Frustrating", "Satisfying", "Offensive"], "answer": [0, 1, 3], "explanation": "UX goals 关注用户感受。Boring、frustrating、offensive 都是负面体验。"}, {"topic": "Visual Design", "type": "single", "q": "White space is mainly used to:", "options": ["Waste screen space", "Separate elements and reduce visual clutter", "Hide important functions", "Increase the number of colours"], "answer": [1], "explanation": "留白可以分隔信息、降低拥挤感、增强层次与可读性。"}, {"topic": "Visual Design", "type": "single", "q": "Proximity in visual design means:", "options": ["Related elements should be placed close together", "All elements should use the same colour", "Everything should be centred", "Buttons should always be red"], "answer": [0], "explanation": "接近性表示距离近的元素会被理解为同一组，因此相关功能应靠近摆放。"}, {"topic": "Visual Design", "type": "single", "q": "Similarity means that:", "options": ["Elements with similar appearance are perceived as related", "All text must be large", "All buttons must be hidden", "Users must remember all icons"], "answer": [0], "explanation": "相似性利用颜色、形状、大小、样式表示同类功能，帮助用户快速理解。"}, {"topic": "Visual Design", "type": "single", "q": "Which colour model is primarily used for screen display?", "options": ["CMYK", "RGB", "Pantone only", "Grayscale only"], "answer": [1], "explanation": "RGB 用于屏幕显示；CMYK 主要用于印刷品。"}, {"topic": "Visual Design", "type": "single", "q": "Which colour model is primarily used for printing?", "options": ["RGB", "CMYK", "HSL only", "HSV only"], "answer": [1], "explanation": "CMYK 是印刷常用色彩模式，RGB 是电子屏幕常用。"}, {"topic": "Visual Design", "type": "multiple", "q": "Good colour use in interface design includes:", "options": ["Using enough contrast for text and key controls", "Keeping primary colours limited", "Using colour harmony", "Using highly saturated backgrounds for long text"], "answer": [0, 1, 2], "explanation": "好配色需要对比度、主色控制和色彩协调。长文本背景不适合高饱和色，会造成视觉疲劳。"}, {"topic": "Visual Design", "type": "single", "q": "Complementary colours are useful when designers want to:", "options": ["Create strong contrast", "Make all elements look identical", "Avoid visual focus", "Reduce all colour differences"], "answer": [0], "explanation": "互补色位于色轮相对位置，能形成强烈对比，适合突出重点元素。"}, {"topic": "Menus and Icons", "type": "single", "q": "A cascading menu is problematic mainly because:", "options": ["It requires precise pointer control", "It cannot show multiple levels", "It is always faster than flat menus", "It removes all options"], "answer": [0], "explanation": "级联菜单能显示多层选项，但需要精确鼠标控制，不适合频繁或移动端操作。"}, {"topic": "Menus and Icons", "type": "single", "q": "A hamburger menu is especially useful for:", "options": ["Large desktop dashboards only", "Small screens and mobile navigation", "Printing documents", "Voice-only interfaces"], "answer": [1], "explanation": "汉堡菜单常用于小屏幕隐藏导航，节省空间。"}, {"topic": "Menus and Icons", "type": "multiple", "q": "Good menu design includes:", "options": ["Putting related functions close together", "Placing common functions near the top", "Separating dangerous actions", "Using more than five nested levels"], "answer": [0, 1, 2], "explanation": "菜单应分组清楚、常用优先、危险操作隔离。嵌套太深会增加查找成本。"}, {"topic": "Menus and Icons", "type": "single", "q": "An analogical icon represents a function by:", "options": ["Using an arbitrary symbol with no relation", "Using a similar real object or analogy", "Using only text", "Using no visual cue"], "answer": [1], "explanation": "Analogical icon 通过类比表达功能，例如剪刀代表剪切。"}, {"topic": "Menus and Icons", "type": "single", "q": "Which icon is an arbitrary icon?", "options": ["A folder icon for files", "Scissors for cut", "An X symbol for delete", "A shopping cart for shopping"], "answer": [2], "explanation": "X 表示删除主要是约定俗成，不是因为它真实像“删除”这个动作。"}, {"topic": "Accessibility", "type": "multiple", "q": "Accessibility design should consider users with:", "options": ["Visual impairments", "Auditory impairments", "Motor impairments", "Cognitive or mental disabilities"], "answer": [0, 1, 2, 3], "explanation": "无障碍设计要考虑视觉、听觉、运动、认知或心理障碍用户。"}, {"topic": "Accessibility", "type": "single", "q": "A screen reader is mainly used by:", "options": ["Blind or visually impaired users", "Users who want to print documents", "Users who only need colour contrast", "Users who want to play games faster"], "answer": [0], "explanation": "Screen reader 将屏幕内容转换为语音或盲文输出，主要帮助盲人或视觉障碍用户。"}, {"topic": "Accessibility", "type": "single", "q": "Screen magnification software is mainly designed for:", "options": ["Low-vision users", "Only expert programmers", "Users with no display", "Users who want fewer words"], "answer": [0], "explanation": "屏幕放大软件帮助低视力用户放大界面内容。"}, {"topic": "Accessibility", "type": "multiple", "q": "Which are common accessibility checks for a website?", "options": ["Image alt text", "Video captions", "Keyboard control", "Colour contrast"], "answer": [0, 1, 2, 3], "explanation": "常见无障碍检查包括图片替代文本、视频字幕、键盘可操作性、字体大小和颜色对比度。"}, {"topic": "Responsive and Adaptive Design", "type": "single", "q": "Responsive design mainly means:", "options": ["One flexible design adapts fluidly across screen sizes", "Separate fixed layouts are created for each device", "The server always detects the exact device model", "The interface works only on mobile"], "answer": [0], "explanation": "Responsive design 是一套页面通过 fluid grids、flexible images、CSS breakpoints 适配不同屏幕。"}, {"topic": "Responsive and Adaptive Design", "type": "single", "q": "Adaptive design mainly means:", "options": ["One layout changes continuously", "Multiple fixed layouts are prepared for different devices", "The interface ignores device differences", "All content is hidden on mobile"], "answer": [1], "explanation": "Adaptive design 是多套固定布局，根据设备或环境加载对应版本。"}, {"topic": "Responsive and Adaptive Design", "type": "single", "q": "Which is a benefit of responsive design?", "options": ["Lower maintenance cost", "Always fastest loading speed", "No need for flexible layout", "Only works for known devices"], "answer": [0], "explanation": "响应式设计通常维护成本较低，能适配未知新设备，但性能不一定总是最好。"}, {"topic": "Responsive and Adaptive Design", "type": "single", "q": "Which is a benefit of adaptive design?", "options": ["Precise device-specific experience", "Only one code layout is needed", "No maintenance cost", "It never becomes incompatible"], "answer": [0], "explanation": "自适应设计能针对设备提供更精准体验，但开发维护成本较高。"}, {"topic": "Responsive and Adaptive Design", "type": "multiple", "q": "Which are levels of adaptation?", "options": ["Layout adaptation", "Content adaptation", "Interaction adaptation", "Functional adaptation"], "answer": [0, 1, 2, 3], "explanation": "适配可以发生在布局、内容、交互、功能、情境等多个层面。"}, {"topic": "Responsive and Adaptive Design", "type": "single", "q": "Functional consistency across devices means:", "options": ["Every device must show exactly the same interface", "Core tasks should remain accessible across devices", "Mobile must contain more functions than desktop", "Desktop features must be removed"], "answer": [1], "explanation": "一致性不等于完全相同。核心功能应跨设备可用，高级功能可以在大屏扩展。"}, {"topic": "UCD Predesign", "type": "single", "q": "Brainstorming is most valuable:", "options": ["At the beginning of a project to explore the problem space", "Only after final deployment", "Only when coding is complete", "Only for measuring task completion time"], "answer": [0], "explanation": "Brainstorming 用于项目初期发散思考，寻找问题空间和可能方案。"}, {"topic": "UCD Predesign", "type": "single", "q": "An affinity diagram is used to:", "options": ["Measure pointing time", "Organize many ideas into natural relationships", "Create the final visual colour palette", "Calculate precision and recall"], "answer": [1], "explanation": "亲和图把大量想法或用户反馈按自然关系分类，找出共同主题和模式。"}, {"topic": "UCD Predesign", "type": "single", "q": "A product description statement should mainly describe:", "options": ["What the product will do to meet users' goals", "Only the programming language used", "Only the final visual colours", "Only the company history"], "answer": [0], "explanation": "PDS 通常简短说明产品如何满足用户目标，是从问题到方案的桥梁。"}, {"topic": "UCD Predesign", "type": "multiple", "q": "A problem statement commonly includes:", "options": ["Ideal situation", "Current reality", "Consequences", "Proposal"], "answer": [0, 1, 2, 3], "explanation": "Problem statement 可以包括理想状态、现实问题、后果和初步解决方案。"}, {"topic": "Stakeholders", "type": "single", "q": "A primary user is someone who:", "options": ["Directly interacts with the product", "Only reads reports produced by the product", "Funds the project but never uses it", "Only manages the design team"], "answer": [0], "explanation": "Primary/direct user 是直接操作系统完成任务的人。"}, {"topic": "Stakeholders", "type": "single", "q": "A secondary user is someone who:", "options": ["Directly clicks all interface buttons", "Does not directly interact with the product but is affected by its output", "Only writes code for the system", "Only designs the logo"], "answer": [1], "explanation": "Secondary/indirect user 不直接操作系统，但会受到系统输出影响，例如阅读报表的经理。"}, {"topic": "Data Gathering", "type": "multiple", "q": "Which are common data gathering methods in HCI?", "options": ["Interviews", "Focus groups", "Questionnaires", "Observation"], "answer": [0, 1, 2, 3], "explanation": "HCI 常用数据收集方法包括访谈、焦点小组、问卷、直接/间接观察。"}, {"topic": "Data Gathering", "type": "single", "q": "Exploratory interviews are usually conducted:", "options": ["Early in a project to understand users and existing experiences", "Only after the product is launched", "Only to calculate Fitts' Law", "Only to test colour contrast"], "answer": [0], "explanation": "探索性访谈用于早期了解潜在用户、使用情境和问题。"}, {"topic": "Data Gathering", "type": "single", "q": "Which question is a leading question?", "options": ["What difficulties did you experience?", "Can you describe how you completed the task?", "Do you think this interface is confusing and badly designed?", "What did you expect to happen after clicking this button?"], "answer": [2], "explanation": "Leading question 会诱导用户回答。第三个问题已经暗示界面混乱且设计差。"}, {"topic": "Data Gathering", "type": "single", "q": "Which interview type uses fixed closed questions and is easier to analyze?", "options": ["Unstructured interview", "Structured interview", "Semi-structured interview", "Think-aloud interview only"], "answer": [1], "explanation": "Structured interview 流程标准、问题固定，便于比较和分析，但深度可能不足。"}, {"topic": "Data Gathering", "type": "single", "q": "A semi-structured interview is useful because it:", "options": ["Balances predefined questions with follow-up exploration", "Allows no flexibility at all", "Uses only numerical data", "Avoids all participant interaction"], "answer": [0], "explanation": "半结构化访谈既保持一定一致性，又允许追问，是深度与可分析性之间的平衡。"}, {"topic": "Data Gathering", "type": "single", "q": "A focus group is especially useful for identifying:", "options": ["Conflicts in terminology and expectations among users", "The exact colour value of a button", "The server response time only", "The mathematical index of difficulty"], "answer": [0], "explanation": "焦点小组适合发现不同用户群体在术语、期望、态度上的差异。"}, {"topic": "Data Gathering", "type": "single", "q": "An online questionnaire is usually strong because it:", "options": ["Is low-cost and easy to distribute widely", "Always gives deeper answers than interviews", "Requires no internet access", "Eliminates all response bias"], "answer": [0], "explanation": "在线问卷成本低、分发快、便于统计，但深度和控制不如访谈。"}, {"topic": "Observation", "type": "single", "q": "Field observation is strong because it:", "options": ["Captures behaviour in a natural context", "Removes all environmental noise", "Always gives perfect quantitative data", "Prevents ethical concerns"], "answer": [0], "explanation": "真实场景观察能捕捉自然行为，但环境因素更难控制。"}, {"topic": "Observation", "type": "single", "q": "Think aloud requires users to:", "options": ["Complete tasks silently", "Explain their thoughts while interacting with the system", "Only answer a survey after the test", "Avoid describing feelings"], "answer": [1], "explanation": "Think aloud 让用户边操作边说想法，帮助研究者理解行为背后的认知过程。"}, {"topic": "Observation", "type": "single", "q": "Logs and web analytics are limited because they:", "options": ["Cannot easily explain why users behaved in a certain way", "Cannot capture large-scale behaviour", "Are always subjective diaries", "Require users to speak aloud"], "answer": [0], "explanation": "日志可以客观记录点击、停留时间等，但难以解释用户为什么这样做。"}, {"topic": "Data Analysis", "type": "single", "q": "Quantitative analysis focuses mainly on:", "options": ["Numbers, statistics, and measurable patterns", "Stories only", "Interface metaphors only", "Cultural symbols only"], "answer": [0], "explanation": "定量分析关注数值，如均值、标准差、任务时间、错误率。"}, {"topic": "Data Analysis", "type": "single", "q": "Qualitative analysis focuses mainly on:", "options": ["Meaning, themes, and patterns in verbal or observational data", "Only task completion time", "Only mouse distance", "Only RGB values"], "answer": [0], "explanation": "定性分析通过编码、分类、主题分析理解用户说法和行为背后的意义。"}, {"topic": "Charts", "type": "single", "q": "Which chart is best for comparing values across categories?", "options": ["Bar chart", "Histogram", "Line chart", "Scatter plot"], "answer": [0], "explanation": "Bar chart 适合比较类别数据，例如不同功能满意度。"}, {"topic": "Charts", "type": "single", "q": "Which chart is best for showing a distribution of continuous data such as task completion time?", "options": ["Histogram", "Pie chart", "Treemap", "Word cloud"], "answer": [0], "explanation": "Histogram 用于展示连续数据分布，如任务完成时间集中在哪里。"}, {"topic": "Charts", "type": "single", "q": "Which chart is best for showing change over time?", "options": ["Line chart", "Pie chart", "Word cloud", "Box plot"], "answer": [0], "explanation": "Line chart 适合时间序列数据，如用户活跃度随时间变化。"}, {"topic": "Charts", "type": "single", "q": "Which chart is best for showing the relationship between two continuous variables?", "options": ["Scatter plot", "Pie chart", "Stacked bar chart", "Word cloud"], "answer": [0], "explanation": "Scatter plot 用于观察两个连续变量关系，例如年龄与完成时间。"}, {"topic": "Charts", "type": "single", "q": "Which chart is commonly used for eye-tracking or click-area analysis?", "options": ["Heatmap", "Pie chart", "Line chart", "Word cloud"], "answer": [0], "explanation": "Heatmap 用颜色深浅表示数值强弱，常用于点击热区和眼动分析。"}, {"topic": "Persona and Scenario", "type": "single", "q": "A persona is:", "options": ["A fictional character representing a user group", "A real participant's full legal identity", "A final code module", "A statistical test"], "answer": [0], "explanation": "Persona 是虚构人物，用来代表不同用户群体及其需求，不是直接公开真实用户身份。"}, {"topic": "Persona and Scenario", "type": "single", "q": "A context scenario is mainly written from:", "options": ["The user's perspective", "The database perspective", "The compiler's perspective", "The server administrator's perspective"], "answer": [0], "explanation": "Context scenario 从用户视角描述用户如何在情境中达成目标。"}, {"topic": "Persona and Scenario", "type": "single", "q": "A use case scenario mainly emphasizes:", "options": ["User-computer interaction and system response", "Only user emotions with no system behaviour", "Only visual colours", "Only final marketing text"], "answer": [0], "explanation": "Use case scenario 更偏系统视角，描述用户与系统的交互和系统响应。"}, {"topic": "Persona and Scenario", "type": "single", "q": "A task scenario in usability testing should:", "options": ["Give a goal without telling users exact steps to click", "Tell users every button they must press", "Hide the task goal", "Only ask users to describe colours"], "answer": [0], "explanation": "Task scenario 应给用户目标，而不是操作步骤，否则会影响测试真实性。"}, {"topic": "Requirements", "type": "single", "q": "A functional requirement describes:", "options": ["What the system should do", "How attractive the interface feels", "The emotional tone of colours only", "Only development team names"], "answer": [0], "explanation": "Functional requirement 是系统具体功能或行为，例如搜索、登录、添加好友。"}, {"topic": "Requirements", "type": "single", "q": "A non-functional requirement describes:", "options": ["System quality attributes such as usability, security, and performance", "Only the exact buttons users click", "Only database table names", "Only user interview quotes"], "answer": [0], "explanation": "Non-functional requirement 说明系统做得怎么样，例如安全性、可用性、兼容性、性能。"}, {"topic": "Prototype", "type": "single", "q": "A low-fidelity prototype is best for:", "options": ["Early exploration of design concepts", "Final production deployment", "Measuring server uptime", "Replacing all user research"], "answer": [0], "explanation": "低保真原型便宜、快速、容易修改，适合早期探索和沟通。"}, {"topic": "Prototype", "type": "single", "q": "A high-fidelity prototype is best for:", "options": ["Testing realistic interaction and navigation", "Quick rough brainstorming only", "Avoiding all user feedback", "Hiding interaction details"], "answer": [0], "explanation": "高保真原型接近最终产品，适合测试真实交互、导航和视觉体验。"}, {"topic": "Prototype", "type": "multiple", "q": "Which are advantages of paper prototypes?", "options": ["Low cost", "Fast creation", "Stimulating creativity", "Showing complex animations accurately"], "answer": [0, 1, 2], "explanation": "纸质原型便宜、快速、利于协作和诚实反馈，但不能准确展示复杂动画和真实交互。"}, {"topic": "Prototype", "type": "multiple", "q": "Which are advantages of electronic prototypes?", "options": ["Closer to the final product", "Can include animation and interactivity", "More accurate usability testing for detailed interactions", "Always cheaper than paper prototypes"], "answer": [0, 1, 2], "explanation": "电子原型更真实、可交互，可测试细节，但成本和制作时间通常更高。"}, {"topic": "Usability Evaluation", "type": "multiple", "q": "Usability evaluation can be conducted during:", "options": ["Prototype phase", "Development phase", "Deployment phase", "Only after a product is abandoned"], "answer": [0, 1, 2], "explanation": "可用性评估可以贯穿原型、开发和上线后阶段。"}, {"topic": "Usability Evaluation", "type": "multiple", "q": "Quantitative usability metrics include:", "options": ["Task completion time", "Number of errors", "Number of clicks", "User comments about frustration"], "answer": [0, 1, 2], "explanation": "定量指标关注多少、多快，如时间、错误数、点击数。用户评论属于定性数据。"}, {"topic": "Usability Evaluation", "type": "single", "q": "A Likert scale is commonly used to measure:", "options": ["User satisfaction or agreement", "Keyboard voltage", "Exact eye colour", "Database size"], "answer": [0], "explanation": "Likert scale 常用于满意度、同意程度、易用性评价等主观量表。"}, {"topic": "Usability Evaluation", "type": "single", "q": "When should usability testing stop according to a common practical rule?", "options": ["When no new issue trends appear", "After exactly one user", "Only after testing all people in the world", "Before any task is tested"], "answer": [0], "explanation": "常见原则是当新用户不再发现新的问题趋势时可以停止；通常每类 persona 大约 5 人。"}, {"topic": "Usability Evaluation", "type": "multiple", "q": "A usability test plan may include:", "options": ["Purpose of the test", "Test process", "Roles such as facilitator and observer", "Consent form and logging sheets"], "answer": [0, 1, 2, 3], "explanation": "测试计划应包括目的、流程、职责分工、任务脚本、问卷、同意书和记录表。"}, {"topic": "Usability Evaluation", "type": "single", "q": "In usability testing, an observer mainly:", "options": ["Records problems and user behaviour", "Forces the user to click the correct buttons", "Writes production code during the test", "Changes the task goal halfway"], "answer": [0], "explanation": "Observer 主要观察和记录，不应干扰用户完成任务。"}, {"topic": "Usability Evaluation", "type": "single", "q": "A dry run is mainly used to:", "options": ["Check whether the test procedure and prototype work before real testing", "Publish the product immediately", "Replace all participant tests", "Delete consent forms"], "answer": [0], "explanation": "Dry run 是正式测试前的预演，用来发现流程、任务、原型或记录方式的问题。"}, {"topic": "Usability Evaluation", "type": "single", "q": "A severity rating of 4 usually means:", "options": ["Cosmetic problem", "Minor problem", "Major problem", "Show stopper"], "answer": [3], "explanation": "严重程度 4 通常是阻碍发布的问题，修复前不能上线。"}, {"topic": "Usability Evaluation", "type": "multiple", "q": "Severity of usability issues can be judged by:", "options": ["Frequency", "Impact", "Persistence", "The tester's favourite colour"], "answer": [0, 1, 2], "explanation": "严重程度通常看出现频率、对任务影响、是否持续反复出现。"}, {"topic": "Performance Models", "type": "single", "q": "The keystroke-level model is used to:", "options": ["Predict task execution time for different interaction methods", "Measure colour contrast", "Create personas", "Translate interface text"], "answer": [0], "explanation": "KLM 把任务拆成按键、指向、手移动、心理准备等基本动作，用来估算完成时间。"}, {"topic": "Performance Models", "type": "single", "q": "In KLM, K represents:", "options": ["Key press", "Knowledge base", "Keyboard layout only", "Known error"], "answer": [0], "explanation": "K 代表一次按键操作，Shift 等组合键通常要分别计算。"}, {"topic": "Performance Models", "type": "single", "q": "In KLM, P represents:", "options": ["Pointing with a mouse", "Printing a page", "Planning a project", "Privacy protection"], "answer": [0], "explanation": "P 表示用鼠标指向屏幕上的某个位置。"}, {"topic": "Performance Models", "type": "single", "q": "Fitts' Law predicts:", "options": ["The time required to move to a target area", "The number of users needed in a focus group", "The best colour harmony", "The probability of translation errors"], "answer": [0], "explanation": "Fitts' Law 用距离 D 和目标宽度 W 预测指向目标所需时间。"}, {"topic": "Performance Models", "type": "multiple", "q": "According to Fitts' Law, designers can reduce pointing time by:", "options": ["Increasing target size", "Reducing distance to the target", "Placing frequent controls in easy-to-reach areas", "Making all buttons tiny"], "answer": [0, 1, 2], "explanation": "目标越大、越近，越容易点击。常用按钮应大一些、近一些、位置合理。"}, {"topic": "Ethics in HCI", "type": "multiple", "q": "Core ethical principles in HCI data collection include:", "options": ["Voluntary participation", "Informed consent", "Privacy and confidentiality", "Minimising harm"], "answer": [0, 1, 2, 3], "explanation": "HCI 涉及真实用户和数据，必须确保自愿参与、知情同意、隐私保密和最小化伤害。"}, {"topic": "Ethics in HCI", "type": "single", "q": "Informed consent means participants should:", "options": ["Know the study purpose, activities, risks, and data use before agreeing", "Be forced to continue after joining", "Never ask questions", "Provide data without knowing the study"], "answer": [0], "explanation": "知情同意要求参与者在参加前了解研究目的、过程、风险、记录方式和数据用途，并自愿同意。"}, {"topic": "Ethics in HCI", "type": "single", "q": "Voluntary participation means:", "options": ["Participants can choose to join and withdraw without penalty", "Participants must finish even if uncomfortable", "Only expert users can participate", "The researcher can hide all risks"], "answer": [0], "explanation": "自愿参与强调不能强迫，参与者可随时退出，且不会因此受到惩罚。"}, {"topic": "Ethics in HCI", "type": "multiple", "q": "Privacy and confidentiality may involve:", "options": ["Removing identifying information", "Using participant codes instead of names", "Restricting data access", "Publishing full names without permission"], "answer": [0, 1, 2], "explanation": "保护隐私需要匿名化、代号化、限制访问和安全存储，不能未经允许公开真实身份。"}, {"topic": "Cognitive Psychology", "type": "single", "q": "Cognitive psychology studies:", "options": ["How sensory input is transformed, stored, retrieved, and used", "Only computer hardware performance", "Only colour printing", "Only project budgeting"], "answer": [0], "explanation": "认知心理学研究感知、注意、记忆、学习、问题解决、决策等心理过程。"}, {"topic": "Human Memory", "type": "single", "q": "Sensory memory stores information:", "options": ["In its original sensory form for a very brief time", "Permanently for a lifetime", "Only as written notes", "Only after deep reasoning"], "answer": [0], "explanation": "感觉记忆保存原始感官信息，但持续时间极短，例如视觉残影。"}, {"topic": "Human Memory", "type": "single", "q": "Working memory is important for interface design because:", "options": ["It has limited capacity and can be overloaded", "It has unlimited capacity", "It removes the need for feedback", "It only stores information for years"], "answer": [0], "explanation": "工作记忆容量有限，界面信息过多、跨屏记忆、冗余内容都会造成认知负荷。"}, {"topic": "Human Memory", "type": "single", "q": "Long-term memory is commonly organized through:", "options": ["Schema and mental models", "Only random numbers", "Only RGB values", "Only mouse movements"], "answer": [0], "explanation": "长期记忆通过 schema 和 mental model 组织知识，帮助用户理解和预测系统。"}, {"topic": "Human Memory", "type": "single", "q": "Recognition is generally easier than recall because:", "options": ["Users identify information from available options instead of generating it from memory", "Users must remember everything without cues", "It requires more working memory than recall", "It removes all interface elements"], "answer": [0], "explanation": "Recognition 有外部线索，用户只需识别；recall 需要主动回忆，负担更大。"}, {"topic": "Gestalt Principles", "type": "single", "q": "The Gestalt principle of proximity means:", "options": ["Elements close together are perceived as related", "Incomplete shapes are ignored", "Symmetrical elements are always hidden", "Colour contrast should be avoided"], "answer": [0], "explanation": "接近性说明距离近的元素会被归为一组，UI 可用留白区分功能区。"}, {"topic": "Gestalt Principles", "type": "single", "q": "The Gestalt principle of closure means:", "options": ["People mentally complete incomplete shapes", "People ignore all icons", "People cannot understand diagrams", "People always read from right to left"], "answer": [0], "explanation": let state = JSON.parse(localStorage.getItem('comp9511_state_v3') || '{"answered":{},"wrong":[]}');
let mode = 'practice';
let topic = 'All';
let examSet = [];
let examSubmitted = false;

function save(){ localStorage.setItem('comp9511_state_v3', JSON.stringify(state)); }
function topics(){ return ['All', ...Array.from(new Set(QUESTIONS.map(q=>q.topic))).sort()]; }
function setMode(m){ mode=m; examSubmitted=false; if(m==='exam') startExam(); render(); }
function setTopic(t){ topic=t; mode='practice'; render(); }
function resetProgress(){ if(confirm('Reset all progress and wrong-question book?')){ state={answered:{},wrong:[]}; save(); render(); } }
function filtered(){
  let s=document.getElementById('search')?.value?.toLowerCase()||'';
  let arr=QUESTIONS.map((q,i)=>({...q,id:i}));
  if(topic!=='All') arr=arr.filter(q=>q.topic===topic);
  if(s) arr=arr.filter(q=>q.q.toLowerCase().includes(s)||q.topic.toLowerCase().includes(s)||q.options.join(' ').toLowerCase().includes(s));
  if(mode==='wrong') arr=arr.filter(q=>state.wrong.includes(q.id));
  return arr;
}
function updateStats(){
  let total=QUESTIONS.length, answered=Object.keys(state.answered).length, wrong=state.wrong.length;
  let correct=Object.values(state.answered).filter(x=>x.correct).length;
  document.getElementById('totalQ').textContent=total;
  document.getElementById('doneQ').textContent=answered;
  document.getElementById('wrongQ').textContent=wrong;
  document.getElementById('scoreQ').textContent=answered?Math.round(correct/answered*100)+'%':'0%';
  document.getElementById('progressBar').style.width=Math.round(answered/total*100)+'%';
}
function renderTopics(){
  document.getElementById('topics').innerHTML=topics().map(t=>`<button class="btn block ${topic===t?'primary':''}" onclick="setTopic(${JSON.stringify(t)})">${t}</button>`).join('');
}
function isSame(a,b){ return a.length===b.length && a.every(x=>b.includes(x)); }
function submitAnswer(id){
  const q=QUESTIONS[id];
  const checked=[...document.querySelectorAll(`input[name="q_${id}"]:checked`)].map(x=>Number(x.value));
  if(!checked.length){ alert('Please choose at least one option.'); return; }
  const correct=isSame(checked.sort(), [...q.answer].sort());
  state.answered[id]={selected:checked, correct};
  if(!correct && !state.wrong.includes(id)) state.wrong.push(id);
  if(correct) state.wrong=state.wrong.filter(x=>x!==id);
  save(); render();
}
function clearOne(id){ delete state.answered[id]; save(); render(); }
function renderQuestion(q){
  const ans=state.answered[q.id];
  const multi=q.type==='multiple';
  return `<div class="card question">
    <span class="topic">${q.topic}</span><span class="badge">${multi?'Multiple choice':'Single choice'}</span>
    <h2>${q.id+1}. ${q.q}</h2>
    ${q.options.map((op,idx)=>{
      let cls='';
      if(ans){
        if(q.answer.includes(idx)) cls='correct';
        else if(ans.selected.includes(idx)) cls='wrong';
      }
      return `<label class="option ${cls}">
        <input type="${multi?'checkbox':'radio'}" name="q_${q.id}" value="${idx}" ${ans?.selected?.includes(idx)?'checked':''} ${ans?'disabled':''}>
        ${String.fromCharCode(65+idx)}. ${op}
      </label>`
    }).join('')}
    ${ans?`<div class="explain"><b>${ans.correct?'Correct':'Incorrect'}.</b><br>
      <b>Correct answer:</b> ${q.answer.map(i=>String.fromCharCode(65+i)).join(', ')}<br>
      <b>Explanation:</b> ${q.explanation}
    </div>
    <button class="btn gray" onclick="clearOne(${q.id})">Try Again</button>`:
    `<button class="btn green" onclick="submitAnswer(${q.id})">Submit Answer</button>`}
  </div>`;
}
function startExam(){
  examSet=[...QUESTIONS.map((q,i)=>i)].sort(()=>Math.random()-0.5).slice(0,40);
}
function submitExam(){
  examSet.forEach(id=>{
    const q=QUESTIONS[id];
    const checked=[...document.querySelectorAll(`input[name="exam_${id}"]:checked`)].map(x=>Number(x.value));
    if(checked.length){
      const correct=isSame(checked.sort(), [...q.answer].sort());
      state.answered[id]={selected:checked, correct};
      if(!correct && !state.wrong.includes(id)) state.wrong.push(id);
      if(correct) state.wrong=state.wrong.filter(x=>x!==id);
    }
  });
  examSubmitted=true; save(); render();
}
function renderExam(){
  let score=0, attempted=0;
  if(examSubmitted){
    examSet.forEach(id=>{let a=state.answered[id]; if(a){attempted++; if(a.correct) score++;}});
  }
  return `<div class="card"><h2>Mock Exam</h2><p class="small">40 random questions. Single and multiple choice are mixed.</p>
    <button class="btn primary" onclick="startExam(); examSubmitted=false; render()">New Mock Exam</button>
    ${examSubmitted?`<h3>Score: ${score} / ${examSet.length}</h3>`:''}
  </div>` + examSet.map(id=>renderExamQuestion({...QUESTIONS[id],id})).join('') +
  `<div class="card"><button class="btn green" onclick="submitExam()">Submit Mock Exam</button></div>`;
}
function renderExamQuestion(q){
  const ans=examSubmitted?state.answered[q.id]:null;
  const multi=q.type==='multiple';
  return `<div class="card question">
    <span class="topic">${q.topic}</span><span class="badge">${multi?'Multiple choice':'Single choice'}</span>
    <h2>${q.q}</h2>
    ${q.options.map((op,idx)=>{
      let cls='';
      if(ans){ if(q.answer.includes(idx)) cls='correct'; else if(ans.selected.includes(idx)) cls='wrong'; }
      return `<label class="option ${cls}">
        <input type="${multi?'checkbox':'radio'}" name="exam_${q.id}" value="${idx}" ${ans?.selected?.includes(idx)?'checked':''} ${examSubmitted?'disabled':''}>
        ${String.fromCharCode(65+idx)}. ${op}
      </label>`
    }).join('')}
    ${examSubmitted?`<div class="explain"><b>Correct answer:</b> ${q.answer.map(i=>String.fromCharCode(65+i)).join(', ')}<br><b>Explanation:</b> ${q.explanation}</div>`:''}
  </div>`;
}
function render(){
  renderTopics(); updateStats();
  if(mode==='exam'){ document.getElementById('app').innerHTML=renderExam(); updateStats(); return; }
  let arr=filtered();
  let title=mode==='wrong'?'Wrong Question Book':'Topic Practice';
  document.getElementById('app').innerHTML=`<div class="card"><h2>${title}</h2><p class="small">Showing ${arr.length} question(s). Topic: ${topic}</p></div>` + 
    (arr.length?arr.map(renderQuestion).join(''):`<div class="card">No questions found.</div>`);
  updateStats();
}
render();
</script>
